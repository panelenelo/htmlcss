<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="./css/google.css">
        <title>Google</title>
    </head>

        <div class="mainImg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1280px-Google_2015_logo.svg.png" alt="google logo" class="googleLogo">
        </div>
        <div>
            <div>
                <input type="text" placeholder="Search" class="textBar">

            <div class="pageButtons">

                <button class="searchButton">I'm Feeling Lucky</button>
            </div>
            <p class="privacyPolicy">
                Google protect privacy. see <a href="https://www.google.com/intl/en/policies/privacy/">here</a>
            </p>
        </div>
    </body>
</html>
